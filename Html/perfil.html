<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Mônica e os Amigos</title>
    <link rel="stylesheet" href="../css/perfil.css">
</head>
<body>
    <main class="perfil-container">
        <div class="perfil-card">
                <div class="profile-header">
                    <div class="profile-avatar">
                        <img src="../img/silivan-munguarakarama-NrR9gn3lFKU-unsplash.jpg" alt="Foto do perfil" class="avatar-img">
                        <button class="edit-avatar-btn">Editar Foto</button>
                    </div>
                    <div class="profile-info">
                        <h2 class="profile-name">Lourivaldo Gaspar</h2>
                        <p class="profile-email">Lourivaldosilva@gmail.com</p>
                        <p class="profile-join-date">Membro desde Janeiro 2024</p>
                    </div>
                </div>

                <div class="profile-content">
                    <div class="profile-section">
                        <h3>Informações Pessoais</h3>
                        <div class="info-grid">
                            <div class="info-item">
                                <label>Nome Completo</label>
                                <div class="info-display">João Silva Santos</div>
                            </div>
                            <div class="info-item">
                                <label>Email</label>
                                <div class="info-display">joao.silva@email.com</div>
                            </div>
                            <div class="info-item">
                                <label>Data de Nascimento</label>
                                <div class="info-display">15 de Março de 1990</div>
                            </div>
                            <div class="info-item">
                                <label>Telefone</label>
                                <div class="info-display">(11) 99999-9999</div>
                            </div>
                        </div>
                    </div>

                    <div class="profile-section">
                        <h3>Preferências</h3>
                        <div class="preferences">
                            <div class="preference-item">
                                <label class="checkbox-label">
                                    <input type="checkbox" checked>
                                    <span class="checkmark"></span>
                                    Receber notificações por email
                                </label>
                            </div>
                            <div class="preference-item">
                                <label class="checkbox-label">
                                    <input type="checkbox" checked>
                                    <span class="checkmark"></span>
                                    Compartilhar dados com parceiros
                                </label>
                            </div>
                            <div class="preference-item">
                                <label class="checkbox-label">
                                    <input type="checkbox">
                                    <span class="checkmark"></span>
                                    Modo escuro
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="profile-section">
                        <h3>Estatísticas</h3>
                        <div class="stats-grid">
                            <div class="stat-item">
                                <div class="stat-number">15</div>
                                <div class="stat-label">Amigos</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-number">8</div>
                                <div class="stat-label">Grupos</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-number">42</div>
                                <div class="stat-label">Posts</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-number">128</div>
                                <div class="stat-label">Curtidas</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="profile-actions">
                    <button class="btn btn-primary">Editar Perfil</button>
                    <button class="btn btn-secondary">Alterar Senha</button>
                    <button class="btn btn-danger">Excluir Conta</button>
                </div>
        </div>
    </main>
</body>
</html>

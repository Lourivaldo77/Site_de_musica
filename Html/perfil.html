<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Mônica & Amigos</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .profile-header {
            background: linear-gradient(180deg, rgba(30, 60, 114, 0.8) 0%, var(--bg-primary) 100%);
            padding: var(--spacing-2xl);
            margin-bottom: var(--spacing-xl);
        }
        .profile-info {
            display: flex;
            align-items: center;
            gap: var(--spacing-xl);
            flex-wrap: wrap;
        }
        .profile-avatar {
            width: 150px;
            height: 150px;
            border-radius: var(--radius-full);
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: 700;
            color: var(--text-primary);
            flex-shrink: 0;
        }
        .profile-details h1 {
            font-size: var(--font-size-4xl);
            margin-bottom: var(--spacing-sm);
        }
        .profile-details p {
            color: var(--text-secondary);
            margin-bottom: var(--spacing-md);
        }
        .profile-stats {
            display: flex;
            gap: var(--spacing-xl);
            margin-top: var(--spacing-md);
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            font-size: var(--font-size-2xl);
            font-weight: 700;
            display: block;
        }
        .stat-label {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
        }
        .profile-actions {
            display: flex;
            gap: var(--spacing-md);
            margin-top: var(--spacing-lg);
        }
        .settings-section {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
        }
        .settings-section h2 {
            font-size: var(--font-size-xl);
            margin-bottom: var(--spacing-md);
        }
        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-md);
            border-bottom: 1px solid var(--border);
        }
        .settings-item:last-child {
            border-bottom: none;
        }
        .settings-item label {
            font-weight: 500;
        }
        .settings-item input,
        .settings-item select {
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <svg viewBox="0 0 24 24" fill="#1DB954">
                    <circle cx="12" cy="12" r="12" fill="#1DB954"/>
                    <path d="M8 5v14l11-7z" fill="white"/>
                </svg>
                <h1>Mônica & Amigos</h1>
            </div>
            <nav>
                <ul class="sidebar-nav">
                    <li><a href="home.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke-width="2"/>
                            <polyline points="9 22 9 12 15 12 15 22" stroke-width="2"/>
                        </svg>
                        Início
                    </a></li>
                    <li><a href="biblioteca.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" stroke-width="2"/>
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" stroke-width="2"/>
                        </svg>
                        Biblioteca
                    </a></li>
                    <li><a href="playlists.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <rect x="3" y="3" width="18" height="18" rx="2" stroke-width="2"/>
                            <line x1="9" y1="9" x2="15" y2="9" stroke-width="2"/>
                            <line x1="9" y1="15" x2="15" y2="15" stroke-width="2"/>
                        </svg>
                        Playlists
                    </a></li>
                    <li><a href="artistas.html">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke-width="2"/>
                            <circle cx="9" cy="7" r="4" stroke-width="2"/>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87" stroke-width="2"/>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75" stroke-width="2"/>
                        </svg>
                        Artistas
                    </a></li>
                    <li><a href="perfil.html" class="active">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke-width="2"/>
                            <circle cx="12" cy="7" r="4" stroke-width="2"/>
                        </svg>
                        Perfil
                    </a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <nav class="header-nav">
                    <button id="menu-toggle" class="menu-toggle hidden">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <line x1="3" y1="12" x2="21" y2="12" stroke-width="2"/>
                            <line x1="3" y1="6" x2="21" y2="6" stroke-width="2"/>
                            <line x1="3" y1="18" x2="21" y2="18" stroke-width="2"/>
                        </svg>
                    </button>
                    <a href="home.html">Início</a>
                    <a href="biblioteca.html">Biblioteca</a>
                    <a href="playlists.html">Playlists</a>
                </nav>
                <div class="header-actions">
                    <div class="search-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="11" cy="11" r="8" stroke-width="2"/>
                            <path d="m21 21-4.35-4.35" stroke-width="2"/>
                        </svg>
                        <input type="text" placeholder="O que você quer ouvir?">
                    </div>
                    <div class="user-menu">
                        <div class="user-avatar">U</div>
                        <span>Usuário</span>
                    </div>
                </div>
            </header>

            <div class="content-area">
                <div class="profile-header">
                    <div class="profile-info">
                        <div class="profile-avatar" id="profile-avatar">U</div>
                        <div class="profile-details">
                            <h1 id="profile-name">Usuário</h1>
                            <p id="profile-email">usuario@email.com</p>
                            <div class="profile-stats">
                                <div class="stat-item">
                                    <span class="stat-value" id="stat-playlists">0</span>
                                    <span class="stat-label">Playlists</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-value" id="stat-followers">0</span>
                                    <span class="stat-label">Seguidores</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-value" id="stat-following">0</span>
                                    <span class="stat-label">Seguindo</span>
                                </div>
                            </div>
                            <div class="profile-actions">
                                <button class="btn-primary" style="padding: 0.75rem 1.5rem;">Editar Perfil</button>
                                <button class="btn-secondary" style="padding: 0.75rem 1.5rem;" onclick="logout()">Sair</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="settings-section">
                    <h2>Configurações</h2>
                    <div class="settings-item">
                        <label>Nome de usuário</label>
                        <input type="text" id="settings-username" value="">
                    </div>
                    <div class="settings-item">
                        <label>E-mail</label>
                        <input type="email" id="settings-email" value="">
                    </div>
                    <div class="settings-item">
                        <label>Tema</label>
                        <select id="settings-theme">
                            <option value="dark">Escuro</option>
                            <option value="light">Claro</option>
                        </select>
                    </div>
                    <div class="settings-item">
                        <label>Qualidade de áudio</label>
                        <select id="settings-quality">
                            <option value="high">Alta</option>
                            <option value="medium">Média</option>
                            <option value="low">Baixa</option>
                        </select>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="player">
        <div class="player-track">
            <img src="../img/images (1).jpeg" alt="Track" class="player-track-image">
            <div class="player-track-info">
                <div class="player-track-title">Selecione uma música</div>
                <div class="player-track-artist">Artista</div>
            </div>
            <button id="like-btn" class="player-like">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" stroke-width="2"/>
                </svg>
            </button>
        </div>
        <div class="player-controls">
            <div class="player-buttons">
                <button id="shuffle-btn" class="player-button" title="Embaralhar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <polyline points="16 3 21 3 21 8" stroke-width="2"/>
                        <line x1="4" y1="20" x2="21" y2="3" stroke-width="2"/>
                        <polyline points="21 16 21 21 16 21" stroke-width="2"/>
                        <line x1="15" y1="15" x2="21" y2="21" stroke-width="2"/>
                        <line x1="4" y1="4" x2="9" y2="9" stroke-width="2"/>
                    </svg>
                </button>
                <button id="prev-btn" class="player-button" title="Anterior">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                    </svg>
                </button>
                <button id="play-pause-btn" class="player-button play-pause" title="Reproduzir">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                </button>
                <button id="next-btn" class="player-button" title="Próxima">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                    </svg>
                </button>
                <button id="repeat-btn" class="player-button" title="Repetir" data-mode="off">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <polyline points="17 1 21 5 17 9" stroke-width="2"/>
                        <path d="M3 11V9a4 4 0 0 1 4-4h14" stroke-width="2"/>
                        <polyline points="7 23 3 19 7 15" stroke-width="2"/>
                        <path d="M21 13v2a4 4 0 0 1-4 4H3" stroke-width="2"/>
                    </svg>
                </button>
            </div>
            <div class="player-progress">
                <span class="player-current-time">0:00</span>
                <div class="progress-bar">
                    <div class="progress-bar-fill"></div>
                </div>
                <span class="player-duration">0:00</span>
            </div>
        </div>
        <div class="player-extra">
            <div class="volume-control">
                <button id="volume-btn" class="player-button" title="Volume">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                </button>
                <div class="volume-slider">
                    <div class="volume-slider-fill"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Load user profile
        const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
        if (currentUser) {
            document.getElementById('profile-name').textContent = currentUser.name || 'Usuário';
            document.getElementById('profile-email').textContent = currentUser.email || '';
            document.getElementById('profile-avatar').textContent = (currentUser.name || 'U').charAt(0).toUpperCase();
            document.getElementById('settings-username').value = currentUser.username || '';
            document.getElementById('settings-email').value = currentUser.email || '';
            document.querySelector('.user-avatar').textContent = (currentUser.name || 'U').charAt(0).toUpperCase();
        } else {
            window.location.href = '/Html/login.html';
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = '/Html/index.html';
        }
    </script>
    <script type="module" src="js/player.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>

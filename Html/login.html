<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nosso Site</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <main class="login-container">
        <div class="login-card">
            <h2>Entrar</h2>
            <form id="login-form" action="/Html/dashboard.html" method="get">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="seu@exemplo.com" required>

                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="Digite sua senha" required>

                <button type="submit" class="btn btn-submit">Entrar</button>
            </form>

            <div class="links">
                <a href="/Html/cadastro.html">Criar conta</a>
                <a href="/Html/index.html">Voltar</a>
            </div>
        </div>
    </main>
</body>
</html>

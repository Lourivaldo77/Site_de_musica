<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Nosso Site</title>
    <link rel="stylesheet" href="/css/cadastro.css">
</head>
<body>
    <main class="cadastro-container">
        <div class="cadastro-card">
            <h2>Criar Conta</h2>
            <form id="cadastro-form" action="#" method="post">
                <label for="name">Nome completo</label>
                <input type="text" id="name" name="name" placeholder="Seu nome completo" required>

                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="seu@exemplo.com" required>

                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="Crie uma senha" required>

                <label for="confirm-password">Confirmar senha</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Repita a senha" required>

                <button type="submit" class="btn btn-submit">Criar conta</button>
            </form>

            <div class="links">
                <a href="/Html/login.html">Já tenho conta</a>
                <a href="/Html/index.html">Voltar</a>
            </div>
        </div>
    </main>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato • MusicApp</title>
    <link rel="stylesheet" href="../css/contato.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="contato.css">
</head>
<body>
    <div data-include="nav"></div>
    <script src="../js/include-nav.js"></script>
   
    <div id="PRIMEIRA">
        <form action="">
            <h2>FALE CONNOSCO</h2>
            <p>Preeencha os campos abaixo.</p>
             <label for="NOME">NOME:</label>
             <input type="NOME" id="NOME" placeholder="NOME" required><br><br>
              <label for="EMAIL">EMAIL:</label>
             <input type="EMAIL" id="EMAIL" placeholder="EMAIL" required><br><br>
              <label for="MENSAGEM">MENSAGEM:</label>
             <input type="MENSAGEM" id="MENSAGEM" placeholder="MENSAGEM" required><BR></BR>
             <button type="submit">ENVIAR</button>
        </form>
    </div>

    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            window.location.href = '/Html/erro404.html';
        });
    </script>
</body>
</html>

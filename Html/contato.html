<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato • MusicApp</title>
    <link rel="stylesheet" href="../css/contato.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="cabecalho">
        <a class="logo" href="app_principal.html">MusicApp</a>
        <nav class="menu">
            <a href="app_principal.html">Início</a>
            <a href="biblioteca.html">Biblioteca</a>
            <a href="playlists.html">Playlists</a>
            <a class="ativo" href="contato.html">Contato</a>
        </nav>
    </header>

    <main class="container">
        <section class="bloco">
            <h1>Fale Conosco</h1>
            <p>Preencha os campos abaixo. Este formulário é apenas visual (não envia).</p>
            <!-- Formulário simples, sem JavaScript -->
            <form class="form">
                <label>Nome
                    <input type="text" placeholder="Seu nome" required>
                </label>
                <label>Email
                    <input type="email" placeholder="Seu email" required>
                </label>
                <label>Mensagem
                    <textarea rows="5" placeholder="Como podemos ajudar?"></textarea>
                </label>
                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>

    <footer class="rodape">
        <small>Resposta automática não configurada • Exemplo didático</small>
    </footer>
</body>
</html>
